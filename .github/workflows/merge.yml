name: Merge List Data

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Compile Leaderboard and Data
        run: |
          if npm run | grep -q "build"; then
            npm run build
          elif npm run | grep -q "compile"; then
            npm run compile
          else
            node index.js || node scripts/index.js || echo "No execution script found"
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@://github.com'
          git add -A
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "Automated leaderboard calculation [skip ci]"
            git push origin main
          fi
